repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend-lint
        entry: pnpm lint
        language: system
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: pnpm typecheck
        language: system
        pass_filenames: false
      - id: frontend-test
        name: frontend-test
        entry: pnpm test
        language: system
        pass_filenames: false
      - id: contract-check
        name: contract-check
        entry: pnpm contract:check
        language: system
        pass_filenames: false
